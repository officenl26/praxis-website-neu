<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;1,400&family=Inter:wght@500&display=swap');
      .nl-name { font-family: 'Spectral', Georgia, 'Times New Roman', serif; font-size: 130px; font-weight: 400; }
      .nl-name-italic { font-family: 'Spectral', Georgia, 'Times New Roman', serif; font-size: 130px; font-weight: 400; font-style: italic; }
      .nl-subtitle { font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; font-size: 22px; font-weight: 500; letter-spacing: 9px; }
    ]]></style>
  </defs>

  <rect width="1200" height="400" fill="#0F1A14"/>

  <!-- Wortmarke -->
  <text x="600" y="200" text-anchor="middle">
    <tspan class="nl-name" fill="#E8F0E8">Nicole </tspan><tspan class="nl-name-italic" fill="#7AA890">Lurz</tspan>
  </text>

  <line x1="540" y1="240" x2="660" y2="240" stroke="#7AA890" stroke-width="1.5"/>

  <text x="600" y="290" text-anchor="middle" class="nl-subtitle" fill="#A8BAB0">HEILPRAKTIKERIN · WIESLOCH</text>
</svg>
